<aside class="sidebar text-white p-3 p-lg-4">
  <div class="brand-pill d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-shield-lock fs-5"></i>
      <div>
        <h5 class="mb-0">VulnSight</h5>
        <div class="small text-secondary">Exposure Platform</div>
      </div>
    </div>
    <span class="badge bg-dark-subtle text-light border border-secondary-subtle">SOC</span>
  </div>

  <div class="small text-secondary mb-3">{{ current_organization.name|default:'Sin organización activa' }}</div>

  <ul class="nav flex-column gap-1">
    <li><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/"><i class="bi bi-grid-1x2"></i>Dashboard</a></li>
    <li><a class="nav-link {% if request.path|slice:':8' == '/assets/' %}active{% endif %}" href="/assets/"><i class="bi bi-hdd-network"></i>Assets</a></li>
    <li><a class="nav-link {% if request.path|slice:':7' == '/scans/' %}active{% endif %}" href="/scans/"><i class="bi bi-activity"></i>Scans</a></li>
    <li><a class="nav-link {% if request.path|slice:':10' == '/findings/' %}active{% endif %}" href="/findings/"><i class="bi bi-exclamation-diamond"></i>Findings</a></li>
    <li><a class="nav-link {% if request.path|slice:':16' == '/knowledge-base/' %}active{% endif %}" href="/knowledge-base/"><i class="bi bi-shield-exclamation"></i>NVD CVEs</a></li>
    <li><a class="nav-link {% if request.path|slice:':10' == '/exploits/' %}active{% endif %}" href="/exploits/"><i class="bi bi-lightning-charge-fill"></i>Exploit Intelligence</a></li>
    <li><a class="nav-link {% if request.path|slice:':29' == '/accounts/organization/team/' %}active{% endif %}" href="/accounts/organization/team/"><i class="bi bi-people"></i>Organization / Team</a></li>
  </ul>

  <hr class="border-secondary-subtle my-3">

  <form method="post" action="{% url 'logout' %}" class="m-0">
    {% csrf_token %}
    <button type="submit" class="nav-link border-0 bg-transparent w-100 text-start">
      <i class="bi bi-box-arrow-right"></i>Logout
    </button>
  </form>
</aside>
