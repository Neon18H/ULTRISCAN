<div class="auth-field mb-3">
  <label class="auth-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
  {{ field }}
  {% if field.help_text %}
    <div class="auth-help">{{ field.help_text }}</div>
  {% endif %}
  {% if field.errors %}
    <div class="auth-error mt-1">{{ field.errors|striptags }}</div>
  {% endif %}
</div>
