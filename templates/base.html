{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <title>VulnSight</title>
  <style>
    :root{
      --bg:#f2f5fa;
      --bg-soft:#f8fafc;
      --panel:#ffffff;
      --ink:#0f172a;
      --ink-soft:#334155;
      --muted:#64748b;
      --line:#e2e8f0;
      --line-strong:#cbd5e1;
      --brand:#0f3b79;
      --brand-soft:#dbeafe;
      --sidebar:#0b1528;
      --sidebar-deep:#070f1f;
      --critical:#b42318;
      --critical-soft:#fef3f2;
      --high:#c2410c;
      --high-soft:#fff7ed;
      --medium:#b45309;
      --medium-soft:#fffbeb;
      --low:#1d4ed8;
      --low-soft:#eff6ff;
      --info:#475569;
      --info-soft:#f1f5f9;
      --status-pending:#64748b;
      --status-queued:#1d4ed8;
      --status-running:#0f766e;
      --status-completed:#166534;
      --status-failed:#b91c1c;
      --status-cancelled:#6b7280;
    }

    body{background:var(--bg);color:var(--ink);font-feature-settings:"ss01" on, "cv01" on}

    .sidebar{
      width:280px;
      min-height:100vh;
      background:linear-gradient(180deg,var(--sidebar),var(--sidebar-deep));
      position:fixed;
      left:0;
      top:0;
      border-right:1px solid rgba(148,163,184,.14);
      z-index:1021;
    }
    .content-wrap{margin-left:280px}

    .sidebar .brand-pill{background:rgba(30,41,59,.62);border:1px solid rgba(148,163,184,.2);border-radius:14px;padding:.55rem .8rem}
    .sidebar .nav-link{color:#9fb0c8;padding:.62rem .75rem;border-radius:.7rem;font-weight:500;display:flex;align-items:center;gap:.6rem;transition:all .2s ease}
    .sidebar .nav-link i{font-size:.95rem}
    .sidebar .nav-link.active,
    .sidebar .nav-link:hover{color:#f8fafc;background:rgba(30,41,59,.82);box-shadow:inset 0 0 0 1px rgba(148,163,184,.18)}

    .topbar{background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
    .topbar .org-chip{font-size:.75rem;border-radius:999px;background:#f8fafc;border:1px solid var(--line);padding:.3rem .75rem;color:var(--ink-soft)}

    .page-header h2{font-size:1.5rem;font-weight:700;letter-spacing:-.01em}

    .surface-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 24px rgba(15,23,42,.04)}
    .section-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin-bottom:.95rem}

    .metric-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 24px rgba(15,23,42,.04);height:100%}
    .metric-kicker{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    .metric-value{font-size:1.9rem;font-weight:700;line-height:1.1;letter-spacing:-.01em}
    .metric-meta{font-size:.8rem;color:var(--muted)}
    .metric-icon{height:42px;width:42px;border-radius:12px;display:grid;place-items:center;background:var(--bg-soft);color:var(--brand)}

    .severity-card{border:1px solid var(--line);border-radius:14px;padding:.95rem;display:block;text-decoration:none;color:inherit;transition:all .2s ease;background:#fff}
    .severity-card:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(15,23,42,.06)}
    .severity-card .severity-total{font-size:1.6rem;font-weight:700;line-height:1}
    .severity-card .severity-percentage{font-size:.78rem;color:var(--muted)}
    .severity-critical{border-left:4px solid var(--critical)}
    .severity-high{border-left:4px solid var(--high)}
    .severity-medium{border-left:4px solid var(--medium)}
    .severity-low{border-left:4px solid var(--low)}
    .severity-info{border-left:4px solid var(--info)}

    .severity-badge{font-size:.69rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-radius:999px;padding:.36rem .62rem;display:inline-flex;align-items:center;gap:.25rem}
    .severity-badge i{font-size:.65rem}
    .severity-critical.badge{background:var(--critical-soft)!important;color:var(--critical)!important}
    .severity-high.badge{background:var(--high-soft)!important;color:var(--high)!important}
    .severity-medium.badge{background:var(--medium-soft)!important;color:var(--medium)!important}
    .severity-low.badge{background:var(--low-soft)!important;color:var(--low)!important}
    .severity-info.badge{background:var(--info-soft)!important;color:var(--info)!important}

    .status-badge{font-size:.68rem;font-weight:700;text-transform:uppercase;border-radius:999px;padding:.36rem .62rem;letter-spacing:.03em}
    .status-pending{background:rgba(100,116,139,.18);color:var(--status-pending)}
    .status-queued{background:rgba(29,78,216,.15);color:var(--status-queued)}
    .status-running{background:rgba(15,118,110,.18);color:var(--status-running)}
    .status-completed{background:rgba(22,101,52,.18);color:var(--status-completed)}
    .status-failed{background:rgba(185,28,28,.15);color:var(--status-failed)}
    .status-cancelled{background:rgba(107,114,128,.18);color:var(--status-cancelled)}
    .status-open{background:rgba(185,28,28,.12);color:#991b1b}
    .status-accepted_risk{background:rgba(148,163,184,.2);color:#334155}
    .status-mitigated{background:rgba(15,118,110,.16);color:#0f766e}
    .status-remediated{background:rgba(22,101,52,.15);color:#166534}
    .status-false_positive{background:rgba(100,116,139,.18);color:#475569}

    .activity-feed{display:flex;flex-direction:column;gap:.65rem}
    .activity-item{display:grid;grid-template-columns:auto 1fr;gap:.8rem;padding:.8rem;border:1px solid var(--line);border-radius:12px;background:#fff}
    .activity-icon{height:36px;width:36px;border-radius:10px;background:var(--bg-soft);display:grid;place-items:center;color:var(--brand)}
    .activity-title{font-size:.92rem;font-weight:600;color:var(--ink);margin:0}
    .activity-description{font-size:.82rem;color:var(--muted);margin:0}
    .activity-time{font-size:.74rem;color:var(--muted)}

    .table-enterprise thead th{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom-color:var(--line);padding:.85rem .85rem}
    .table-enterprise tbody td{padding:.9rem .85rem;border-bottom-color:#edf2f7;vertical-align:middle}
    .table-enterprise tbody tr:hover{background:var(--bg-soft)}

    .finding-row{border-left:4px solid transparent;transition:all .15s ease}
    .finding-row.severity-critical{border-left-color:var(--critical)}
    .finding-row.severity-high{border-left-color:var(--high)}
    .finding-row.severity-medium{border-left-color:var(--medium)}
    .finding-row.severity-low{border-left-color:var(--low)}
    .finding-row.severity-info{border-left-color:var(--info)}

    .empty-state{border:1px dashed var(--line-strong);border-radius:14px;padding:2.2rem 1rem;text-align:center;background:var(--bg-soft)}
    .empty-state .bi{font-size:2rem;color:#94a3b8}

    @media (max-width:991.98px){
      .sidebar{position:static;width:100%;min-height:auto;border-right:0}
      .content-wrap{margin-left:0}
    }
  </style>
</head>
<body>
  {% include 'includes/sidebar.html' %}
  <div class="content-wrap">
    {% include 'includes/topbar.html' %}
    <main class="p-4">
      {% include 'includes/messages.html' %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
