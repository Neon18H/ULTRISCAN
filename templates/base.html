{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <title>VulnSight</title>
  <style>
    :root{
      --bg:#f4f7fb;--panel:#ffffff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--brand:#0b3a75;
      --status-pending:#64748b;--status-queued:#1d4ed8;--status-running:#0f766e;--status-completed:#166534;--status-failed:#b91c1c;--status-cancelled:#6b7280;
    }
    body{background:var(--bg);color:var(--ink)}
    .sidebar{width:280px;min-height:100vh;background:linear-gradient(180deg,#0b1426,#0b1f3a);position:fixed;left:0;top:0;border-right:1px solid rgba(148,163,184,.15)}
    .content-wrap{margin-left:280px}
    .nav-link{color:#94a3b8;padding:.6rem .75rem}
    .nav-link.active,.nav-link:hover{color:#e2e8f0;background:rgba(30,41,59,.75);border-radius:.6rem}
    .metric-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 24px rgba(15,23,42,.04)}
    .table-enterprise thead th{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom-color:var(--line)}
    .table-enterprise td{border-bottom-color:#edf2f7}
    .severity-badge{font-size:.74rem;font-weight:700;text-transform:uppercase}
    .severity-critical{background:#7f1d1d}.severity-high{background:#9a3412}.severity-medium{background:#a16207}.severity-low{background:#1d4ed8}.severity-info{background:#0f766e}
    .status-badge{font-size:.72rem;font-weight:700;text-transform:uppercase;border-radius:999px;padding:.35rem .65rem}
    .status-pending{background:rgba(100,116,139,.18);color:var(--status-pending)}
    .status-queued{background:rgba(29,78,216,.15);color:var(--status-queued)}
    .status-running{background:rgba(15,118,110,.18);color:var(--status-running)}
    .status-completed{background:rgba(22,101,52,.18);color:var(--status-completed)}
    .status-failed{background:rgba(185,28,28,.15);color:var(--status-failed)}
    .status-cancelled{background:rgba(107,114,128,.18);color:var(--status-cancelled)}
    .page-header h2{font-size:1.45rem;font-weight:700}
  </style>
</head>
<body>
  {% include 'includes/sidebar.html' %}
  <div class="content-wrap">
    {% include 'includes/topbar.html' %}
    <main class="p-4">
      {% include 'includes/messages.html' %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
