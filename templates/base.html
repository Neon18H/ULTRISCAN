{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <title>VulnSight</title>
  <style>
    body{background:#f3f6fb;color:#1a2233}.sidebar{width:260px;min-height:100vh;background:#111827;position:fixed;left:0;top:0}.content-wrap{margin-left:260px}.nav-link{color:#9ca3af}.nav-link.active,.nav-link:hover{color:#fff;background:#1f2937;border-radius:.5rem}.metric-card{border:0;border-radius:14px;box-shadow:0 4px 16px rgba(17,24,39,.06)}
    .severity-badge{font-size:.75rem;font-weight:600;text-transform:uppercase}
    .severity-critical{background:#7f1d1d}.severity-high{background:#b45309}.severity-medium{background:#b59f3b}.severity-low{background:#1d4ed8}.severity-info{background:#0f766e}
  </style>
</head>
<body>
  {% include 'includes/sidebar.html' %}
  <div class="content-wrap">
    {% include 'includes/topbar.html' %}
    <main class="p-4">
      {% include 'includes/messages.html' %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
