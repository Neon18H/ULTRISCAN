{% extends "base.html" %}{% block content %}<div class="card metric-card"><div class="card-body"><h4>Assets</h4><table class='table table-hover'><thead><tr><th>Nombre</th><th>Tipo</th><th>Valor</th><th>Criticidad</th></tr></thead><tbody>{% for obj in object_list %}<tr><td><a href='/assets/{{ obj.id }}/'>{{ obj.name }}</a></td><td>{{ obj.asset_type }}</td><td>{{ obj.value }}</td><td>{{ obj.criticality }}</td></tr>{% empty %}<tr><td colspan="4" class="text-muted">No hay activos cargados.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
