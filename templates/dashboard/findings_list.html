{% extends "base.html" %}{% block content %}<div class="card metric-card"><div class="card-body"><h4>Findings</h4><table class='table table-hover'><thead><tr><th>Título</th><th>Severidad</th><th>Estado</th></tr></thead><tbody>{% for obj in object_list %}<tr><td><a href='/findings/{{ obj.id }}/'>{{ obj.title }}</a></td><td>{% include 'includes/severity_badge.html' with severity=obj.severity %}</td><td>{{ obj.status }}</td></tr>{% empty %}<tr><td colspan="3" class="text-muted">Sin hallazgos.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
