{% extends 'auth_base.html' %}
{% block content %}
<h3 class="mb-1">Iniciar sesión</h3><p class="text-muted">Accede a tu organización.</p>
<form method="post">{% csrf_token %}
  {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors|striptags }}</div>{% endif %}</div>{% endfor %}
  <button class="btn btn-primary w-100">Entrar</button>
</form>
<div class="text-center mt-3"><a href="/accounts/register/">Crear cuenta</a></div>
{% endblock %}
